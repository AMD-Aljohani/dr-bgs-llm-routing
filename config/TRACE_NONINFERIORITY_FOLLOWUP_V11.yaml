study_name: V11 trace-derived noninferiority certification follow-up
status: frozen_before_followup_result_generation
relationship_to_primary_study: >-
  Designed after the locked absolute-SLO stress test returned universal abstention.
  This is a separate follow-up replication, not a preregistered confirmatory repair
  and not evidence of absolute production safety.
input_selection_file: v11_results/trace_risk_runs.csv
trace_file: trace_data/BurstGPT_first100_public.csv
trace_use:
  positive_rows: 95
  search_pool: first 60 positive rows
  certification_pool: last 35 positive rows
  privacy_labels: synthetic Bernoulli labels
  resampling: moving-block bootstrap with block length 8
reference:
  definition: exhaustive training-selection policy on the same 190-policy grid
  note: not a holdout oracle
paired_replications: 150
new_seed_offset: 12000000
methods:
  - DR-BGS
  - Guarded-GP
noninferiority_events:
  operational_cost:
    violation: selected paired operational cost exceeds reference by more than 5 percent
    margin_relative: 0.05
  protected_blocking:
    violation: selected paired protected-blocking rate exceeds reference by more than 0.02
    margin_absolute: 0.02
  eligible_blocking:
    violation: selected paired eligible-blocking rate exceeds reference by more than 0.02
    margin_absolute: 0.02
risk_certification:
  per_event_risk_budget: 0.10
  familywise_alpha: 0.05
  multiplicity: Bonferroni across three events
  interval: exact one-sided Clopper-Pearson upper bound
  certify: all three upper bounds are at most 0.10
  otherwise: abstain
claims_boundary:
  - The certificate is conditional on the compact public trace slice, declared bootstrap, model, grid, and margins.
  - It certifies noninferiority to an exhaustive training-selection reference, not absolute SLO feasibility.
  - The same trace slice informed the study family; this is an independent-seed follow-up, not external validation.
  - Universal abstention in the locked absolute-SLO study is retained and reported.
